<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoKeep</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d97;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --amber: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header h1 span { color: var(--accent); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .task-card:hover { background: var(--surface-hover); border-color: #3a3d4a; }
    .task-card.completed { opacity: 0.5; }

    .task-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .task-content { flex: 1; min-width: 0; }

    .task-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .task-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .badge-overdue { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-due { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-upcoming { background: rgba(99,102,241,0.15); color: var(--accent-hover); }
    .badge-completed { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-snoozed { background: rgba(139,141,151,0.15); color: var(--text-muted); }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.complete:hover { border-color: var(--success); color: var(--success); }
    .action-btn.snooze:hover { border-color: var(--warning); color: var(--warning); }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 20px; margin-bottom: 8px; }
    .modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

    .tip-box {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .tip-box strong { color: var(--accent-hover); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-warning:hover { background: #d97706; }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      font-size: 14px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 16px;
      font-family: inherit;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

    .difficulty {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .difficulty .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .difficulty.easy .dot:nth-child(1) { background: var(--success); }
    .difficulty.medium .dot:nth-child(1),
    .difficulty.medium .dot:nth-child(2) { background: var(--warning); }
    .difficulty.hard .dot:nth-child(1),
    .difficulty.hard .dot:nth-child(2),
    .difficulty.hard .dot:nth-child(3) { background: var(--danger); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--text-muted);
      font-size: 16px;
    }

    @media (max-width: 640px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .task-card { flex-wrap: wrap; }
      .task-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://peexlwkkfzzrtpzvvgfp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZXhsd2trZnp6cnRwenZ2Z2ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzkyNjQsImV4cCI6MjA4OTQ1NTI2NH0.bKtonD9O7p9Yx8S-9bH39AM3KQz17R8T_Zrv7EMN-hk';

    async function supaFetch(table, options = {}) {
      const { method = 'GET', filters = '', body, select = '*' } = options;
      const url = `${SUPABASE_URL}/rest/v1/${table}?${filters ? filters + '&' : ''}select=${encodeURIComponent(select)}`;
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'PATCH' ? 'return=representation' : 'return=representation'
      };
      const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    function daysUntil(dateStr) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(dateStr + 'T00:00:00');
      return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getStatus(task) {
      if (task.status === 'completed') return 'completed';
      if (task.status === 'snoozed') return 'snoozed';
      const days = daysUntil(task.due_date);
      if (days < 0) return 'overdue';
      if (days <= 3) return 'due';
      return 'upcoming';
    }

    function getDueText(task) {
      const status = getStatus(task);
      if (status === 'completed') return `Done ${task.completed_at ? new Date(task.completed_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''}`;
      if (status === 'snoozed') return `Snoozed → ${formatDate(task.snoozed_until)}`;
      const days = daysUntil(task.due_date);
      if (days < 0) return `${Math.abs(days)} day${Math.abs(days) > 1 ? 's' : ''} overdue`;
      if (days === 0) return 'Due today';
      if (days === 1) return 'Due tomorrow';
      return `Due in ${days} days`;
    }

    function Difficulty({ level }) {
      return (
        <span className={`difficulty ${level}`}>
          <span className="dot"></span>
          <span className="dot"></span>
          <span className="dot"></span>
        </span>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [categories, setCategories] = useState([]);
      const [templates, setTemplates] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('active');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [selectedTask, setSelectedTask] = useState(null);
      const [notes, setNotes] = useState('');

      async function loadData() {
        try {
          const [cats, tmpls, instances] = await Promise.all([
            supaFetch('categories'),
            supaFetch('task_templates'),
            supaFetch('task_instances', { select: '*,template:task_templates(*,category:categories(*))' })
          ]);
          setCategories(cats);
          setTemplates(tmpls);
          setTasks(instances.sort((a, b) => {
            const sa = getStatus(a), sb = getStatus(b);
            const order = { overdue: 0, due: 1, upcoming: 2, snoozed: 3, completed: 4 };
            if (order[sa] !== order[sb]) return order[sa] - order[sb];
            return new Date(a.due_date) - new Date(b.due_date);
          }));
        } catch (e) {
          console.error('Failed to load:', e);
        }
        setLoading(false);
      }

      useEffect(() => { loadData(); }, []);

      async function completeTask(task) {
        const now = new Date().toISOString();
        await supaFetch(`task_instances`, {
          method: 'PATCH',
          filters: `id=eq.${task.id}`,
          body: { status: 'completed', completed_at: now, notes: notes || null }
        });
        // Create next occurrence
        const freq = task.template?.frequency_days || 30;
        const nextDue = new Date();
        nextDue.setDate(nextDue.getDate() + freq);
        await supaFetch('task_instances', {
          method: 'POST',
          body: {
            template_id: task.template_id,
            due_date: nextDue.toISOString().split('T')[0],
            status: 'upcoming'
          }
        });
        setSelectedTask(null);
        setNotes('');
        loadData();
      }

      async function snoozeTask(task, days = 7) {
        const snoozeDate = new Date();
        snoozeDate.setDate(snoozeDate.getDate() + days);
        await supaFetch(`task_instances`, {
          method: 'PATCH',
          filters: `id=eq.${task.id}`,
          body: { status: 'snoozed', snoozed_until: snoozeDate.toISOString().split('T')[0], due_date: snoozeDate.toISOString().split('T')[0] }
        });
        setSelectedTask(null);
        loadData();
      }

      const filtered = useMemo(() => {
        return tasks.filter(t => {
          const status = getStatus(t);
          if (filter === 'active' && (status === 'completed')) return false;
          if (filter === 'overdue' && status !== 'overdue') return false;
          if (filter === 'completed' && status !== 'completed') return false;
          if (categoryFilter !== 'all' && t.template?.category?.name !== categoryFilter) return false;
          return true;
        });
      }, [tasks, filter, categoryFilter]);

      const counts = useMemo(() => {
        const c = { overdue: 0, due: 0, upcoming: 0, completed: 0 };
        tasks.forEach(t => { const s = getStatus(t); if (c[s] !== undefined) c[s]++; });
        return c;
      }, [tasks]);

      const categoryColors = { 'Appliance Maintenance': '#3B82F6', 'Deep Cleaning': '#8B5CF6', 'Seasonal Prep': '#F59E0B' };
      const categoryIcons = { 'Appliance Maintenance': '🔧', 'Deep Cleaning': '✨', 'Seasonal Prep': '🌡️' };

      if (loading) return <div className="app"><div className="loading">Loading CondoKeep...</div></div>;

      return (
        <div className="app">
          <div className="header">
            <h1>🏢 Condo<span>Keep</span></h1>
            <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>
              {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </span>
          </div>

          <div className="stats">
            <div className="stat-card">
              <div className="stat-number" style={{ color: 'var(--danger)' }}>{counts.overdue}</div>
              <div className="stat-label">Overdue</div>
            </div>
            <div className="stat-card">
              <div className="stat-number" style={{ color: 'var(--warning)' }}>{counts.due}</div>
              <div className="stat-label">Due Soon</div>
            </div>
            <div className="stat-card">
              <div className="stat-number" style={{ color: 'var(--accent-hover)' }}>{counts.upcoming}</div>
              <div className="stat-label">Upcoming</div>
            </div>
            <div className="stat-card">
              <div className="stat-number" style={{ color: 'var(--success)' }}>{counts.completed}</div>
              <div className="stat-label">Completed</div>
            </div>
          </div>

          <div className="filters">
            {[
              ['active', 'Active'],
              ['overdue', 'Overdue'],
              ['completed', 'Completed'],
            ].map(([key, label]) => (
              <button key={key} className={`filter-btn ${filter === key ? 'active' : ''}`}
                onClick={() => setFilter(key)}>{label}</button>
            ))}
            <span style={{ width: 1, background: 'var(--border)', margin: '0 4px' }}></span>
            {['all', ...categories.map(c => c.name)].map(name => (
              <button key={name} className={`filter-btn ${categoryFilter === name ? 'active' : ''}`}
                onClick={() => setCategoryFilter(name)}>
                {name === 'all' ? 'All Categories' : `${categoryIcons[name] || ''} ${name}`}
              </button>
            ))}
          </div>

          <div className="task-list">
            {filtered.length === 0 ? (
              <div className="empty-state">
                <div className="emoji">{filter === 'overdue' ? '🎉' : '📋'}</div>
                <p>{filter === 'overdue' ? 'Nothing overdue! Nice work.' : 'No tasks to show.'}</p>
              </div>
            ) : filtered.map(task => {
              const status = getStatus(task);
              const catName = task.template?.category?.name || '';
              const color = categoryColors[catName] || '#6366f1';
              return (
                <div key={task.id} className={`task-card ${status === 'completed' ? 'completed' : ''}`}
                  onClick={() => { setSelectedTask(task); setNotes(''); }}>
                  <div className="task-icon" style={{ background: color + '18', color }}>
                    {categoryIcons[catName] || '📋'}
                  </div>
                  <div className="task-content">
                    <div className="task-name">{task.template?.name || 'Task'}</div>
                    <div className="task-meta">
                      <span>{getDueText(task)}</span>
                      <span>·</span>
                      <span>{formatDate(task.due_date)}</span>
                      {task.template?.estimated_minutes && (
                        <><span>·</span><span>{task.template.estimated_minutes} min</span></>
                      )}
                      {task.template?.difficulty && (
                        <><span>·</span><Difficulty level={task.template.difficulty} /></>
                      )}
                    </div>
                  </div>
                  <span className={`task-badge badge-${status}`}>{status}</span>
                  {status !== 'completed' && (
                    <div className="task-actions" onClick={e => e.stopPropagation()}>
                      <button className="action-btn complete" title="Mark complete"
                        onClick={() => { setSelectedTask(task); setNotes(''); }}>✓</button>
                      <button className="action-btn snooze" title="Snooze 7 days"
                        onClick={() => snoozeTask(task, 7)}>⏰</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {selectedTask && (
            <div className="modal-overlay" onClick={() => setSelectedTask(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <h2>{selectedTask.template?.name}</h2>
                <p>{selectedTask.template?.description}</p>
                {selectedTask.template?.tips && (
                  <div className="tip-box">
                    <strong>💡 Tip:</strong> {selectedTask.template.tips}
                  </div>
                )}
                <div style={{ display: 'flex', gap: 16, marginBottom: 20, fontSize: 13, color: 'var(--text-muted)' }}>
                  <span>📅 {formatDate(selectedTask.due_date)}</span>
                  {selectedTask.template?.estimated_minutes && <span>⏱ {selectedTask.template.estimated_minutes} min</span>}
                  {selectedTask.template?.difficulty && <span>Difficulty: {selectedTask.template.difficulty}</span>}
                </div>
                {getStatus(selectedTask) !== 'completed' && (
                  <>
                    <textarea placeholder="Add notes (optional)..." value={notes}
                      onChange={e => setNotes(e.target.value)} />
                    <div className="modal-actions">
                      <button className="btn btn-ghost" onClick={() => setSelectedTask(null)}>Cancel</button>
                      <button className="btn btn-warning" onClick={() => snoozeTask(selectedTask, 7)}>Snooze 7d</button>
                      <button className="btn btn-success" onClick={() => completeTask(selectedTask)}>✓ Complete</button>
                    </div>
                  </>
                )}
                {getStatus(selectedTask) === 'completed' && (
                  <div className="modal-actions">
                    <button className="btn btn-ghost" onClick={() => setSelectedTask(null)}>Close</button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
