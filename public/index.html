<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoKeep</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d97;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --amber: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header h1 span { color: var(--accent); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* View tabs */
    .view-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .view-tab {
      padding: 8px 20px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-tab:hover { color: var(--text); }
    .view-tab.active { background: var(--accent); color: white; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .task-card:hover { background: var(--surface-hover); border-color: #3a3d4a; }
    .task-card.completed { opacity: 0.5; }

    .task-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .task-content { flex: 1; min-width: 0; }

    .task-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .task-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .badge-overdue { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-due { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-upcoming { background: rgba(99,102,241,0.15); color: var(--accent-hover); }
    .badge-completed { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-snoozed { background: rgba(139,141,151,0.15); color: var(--text-muted); }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.complete:hover { border-color: var(--success); color: var(--success); }
    .action-btn.snooze:hover { border-color: var(--warning); color: var(--warning); }
    .action-btn.delete:hover { border-color: var(--danger); color: var(--danger); }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 20px; margin-bottom: 8px; }
    .modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .modal-header h2 { margin-bottom: 0; }

    .tip-box {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .tip-box strong { color: var(--accent-hover); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-warning:hover { background: #d97706; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      font-size: 14px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 16px;
      font-family: inherit;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

    .difficulty {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .difficulty .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .difficulty.easy .dot:nth-child(1) { background: var(--success); }
    .difficulty.medium .dot:nth-child(1),
    .difficulty.medium .dot:nth-child(2) { background: var(--warning); }
    .difficulty.hard .dot:nth-child(1),
    .difficulty.hard .dot:nth-child(2),
    .difficulty.hard .dot:nth-child(3) { background: var(--danger); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--text-muted);
      font-size: 16px;
    }

    /* Guide cards */
    .guide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.15s;
    }

    .guide-card:hover { border-color: #3a3d4a; }

    .guide-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }

    .guide-card-header:hover { background: var(--surface-hover); }

    .guide-expand {
      color: var(--text-muted);
      font-size: 14px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .guide-expand.open { transform: rotate(90deg); }

    .guide-card-body {
      padding: 0 20px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .guide-description {
      color: var(--text-muted);
      font-size: 14px;
      margin: 16px 0;
      line-height: 1.5;
    }

    .guide-steps {
      background: var(--bg);
      border-radius: 10px;
      padding: 16px;
    }

    .guide-steps h4 {
      font-size: 13px;
      color: var(--accent-hover);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guide-steps p {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .guide-meta {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .guide-freq {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: rgba(99,102,241,0.12);
      color: var(--accent-hover);
    }

    /* Confirm delete overlay */
    .confirm-bar {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .confirm-bar span {
      font-size: 13px;
      color: var(--danger);
    }

    .confirm-bar-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .task-card { flex-wrap: wrap; }
      .task-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://peexlwkkfzzrtpzvvgfp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZXhsd2trZnp6cnRwenZ2Z2ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzkyNjQsImV4cCI6MjA4OTQ1NTI2NH0.bKtonD9O7p9Yx8S-9bH39AM3KQz17R8T_Zrv7EMN-hk';

    async function supaFetch(table, options = {}) {
      const { method = 'GET', filters = '', body, select = '*' } = options;
      const url = `${SUPABASE_URL}/rest/v1/${table}?${filters ? filters + '&' : ''}select=${encodeURIComponent(select)}`;
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
      const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    function daysUntil(dateStr) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(dateStr + 'T00:00:00');
      return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function freqLabel(days) {
      if (days <= 14) return 'Every ' + days + ' days';
      if (days < 60) return 'Monthly';
      if (days < 120) return 'Every ' + Math.round(days / 30) + ' months';
      if (days < 300) return 'Every ' + Math.round(days / 30) + ' months';
      return 'Yearly';
    }

    function getStatus(task) {
      if (task.status === 'completed') return 'completed';
      if (task.status === 'snoozed') return 'snoozed';
      const days = daysUntil(task.due_date);
      if (days < 0) return 'overdue';
      if (days <= 3) return 'due';
      return 'upcoming';
    }

    function getDueText(task) {
      const status = getStatus(task);
      if (status === 'completed') return `Done ${task.completed_at ? new Date(task.completed_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''}`;
      if (status === 'snoozed') return `Snoozed to ${formatDate(task.snoozed_until)}`;
      const days = daysUntil(task.due_date);
      if (days < 0) return `${Math.abs(days)} day${Math.abs(days) > 1 ? 's' : ''} overdue`;
      if (days === 0) return 'Due today';
      if (days === 1) return 'Due tomorrow';
      return `Due in ${days} days`;
    }

    function Difficulty({ level }) {
      return (
        <span className={`difficulty ${level}`}>
          <span className="dot"></span>
          <span className="dot"></span>
          <span className="dot"></span>
        </span>
      );
    }

    function GuideCard({ template, catIcon, catColor, onRemove }) {
      const [open, setOpen] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);

      return (
        <div className="guide-card">
          <div className="guide-card-header" onClick={() => setOpen(!open)}>
            <div className="task-icon" style={{ background: catColor + '18', color: catColor }}>
              {catIcon}
            </div>
            <div style={{ flex: 1 }}>
              <div className="task-name">{template.name}</div>
              <div className="task-meta">
                <span className="guide-freq">{freqLabel(template.frequency_days)}</span>
                {template.estimated_minutes && <span>{template.estimated_minutes} min</span>}
                {template.difficulty && <Difficulty level={template.difficulty} />}
              </div>
            </div>
            <span className={`guide-expand ${open ? 'open' : ''}`}>&#9654;</span>
          </div>
          {open && (
            <div className="guide-card-body">
              <p className="guide-description">{template.description}</p>
              {template.tips && (
                <div className="guide-steps">
                  <h4>How to do it</h4>
                  <p>{template.tips}</p>
                </div>
              )}
              <div className="guide-meta">
                <span>Every {template.frequency_days} days</span>
                <span>&middot;</span>
                <span>{template.difficulty} difficulty</span>
                {template.estimated_minutes && <><span>&middot;</span><span>~{template.estimated_minutes} min</span></>}
              </div>
              {!confirmDelete ? (
                <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
                  <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)', borderColor: 'rgba(239,68,68,0.3)' }}
                    onClick={() => setConfirmDelete(true)}>
                    Remove this chore
                  </button>
                </div>
              ) : (
                <div className="confirm-bar" style={{ marginTop: 16 }}>
                  <span>Remove "{template.name}" permanently? All scheduled instances will be deleted.</span>
                  <div className="confirm-bar-actions">
                    <button className="btn btn-ghost btn-sm" onClick={() => setConfirmDelete(false)}>Cancel</button>
                    <button className="btn btn-danger btn-sm" onClick={() => onRemove(template.id)}>Remove</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [categories, setCategories] = useState([]);
      const [templates, setTemplates] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('tasks'); // 'tasks' or 'guide'
      const [filter, setFilter] = useState('active');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [selectedTask, setSelectedTask] = useState(null);
      const [notes, setNotes] = useState('');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      async function loadData() {
        try {
          const [cats, tmpls, instances] = await Promise.all([
            supaFetch('categories'),
            supaFetch('task_templates', { filters: 'is_active=eq.true' }),
            supaFetch('task_instances', { select: '*,template:task_templates(*,category:categories(*))' })
          ]);
          setCategories(cats);
          setTemplates(tmpls);
          // Filter out instances whose template was deleted
          const activeInstances = instances.filter(i => i.template !== null);
          setTasks(activeInstances.sort((a, b) => {
            const sa = getStatus(a), sb = getStatus(b);
            const order = { overdue: 0, due: 1, upcoming: 2, snoozed: 3, completed: 4 };
            if (order[sa] !== order[sb]) return order[sa] - order[sb];
            return new Date(a.due_date) - new Date(b.due_date);
          }));
        } catch (e) {
          console.error('Failed to load:', e);
        }
        setLoading(false);
      }

      useEffect(() => { loadData(); }, []);

      async function completeTask(task) {
        const now = new Date().toISOString();
        await supaFetch('task_instances', {
          method: 'PATCH',
          filters: `id=eq.${task.id}`,
          body: { status: 'completed', completed_at: now, notes: notes || null }
        });
        const freq = task.template?.frequency_days || 30;
        const nextDue = new Date();
        nextDue.setDate(nextDue.getDate() + freq);
        await supaFetch('task_instances', {
          method: 'POST',
          body: {
            template_id: task.template_id,
            due_date: nextDue.toISOString().split('T')[0],
            status: 'upcoming'
          }
        });
        setSelectedTask(null);
        setNotes('');
        loadData();
      }

      async function snoozeTask(task, days = 7) {
        const snoozeDate = new Date();
        snoozeDate.setDate(snoozeDate.getDate() + days);
        await supaFetch('task_instances', {
          method: 'PATCH',
          filters: `id=eq.${task.id}`,
          body: { status: 'snoozed', snoozed_until: snoozeDate.toISOString().split('T')[0], due_date: snoozeDate.toISOString().split('T')[0] }
        });
        setSelectedTask(null);
        loadData();
      }

      async function removeTemplate(templateId) {
        // Delete all instances for this template first, then the template
        await supaFetch('task_instances', {
          method: 'DELETE',
          filters: `template_id=eq.${templateId}`
        });
        await supaFetch('task_templates', {
          method: 'DELETE',
          filters: `id=eq.${templateId}`
        });
        setSelectedTask(null);
        setConfirmDeleteId(null);
        loadData();
      }

      const filtered = useMemo(() => {
        return tasks.filter(t => {
          const status = getStatus(t);
          if (filter === 'active' && status === 'completed') return false;
          if (filter === 'overdue' && status !== 'overdue') return false;
          if (filter === 'completed' && status !== 'completed') return false;
          if (categoryFilter !== 'all' && t.template?.category?.name !== categoryFilter) return false;
          return true;
        });
      }, [tasks, filter, categoryFilter]);

      const filteredTemplates = useMemo(() => {
        if (categoryFilter === 'all') return templates;
        return templates.filter(t => {
          const cat = categories.find(c => c.id === t.category_id);
          return cat && cat.name === categoryFilter;
        });
      }, [templates, categoryFilter, categories]);

      const counts = useMemo(() => {
        const c = { overdue: 0, due: 0, upcoming: 0, completed: 0 };
        tasks.forEach(t => { const s = getStatus(t); if (c[s] !== undefined) c[s]++; });
        return c;
      }, [tasks]);

      const categoryColors = { 'Appliance Maintenance': '#3B82F6', 'Deep Cleaning': '#8B5CF6', 'Seasonal Prep': '#F59E0B' };
      const categoryIcons = { 'Appliance Maintenance': '🔧', 'Deep Cleaning': '✨', 'Seasonal Prep': '🌡️' };

      function getCatForTemplate(t) {
        const cat = categories.find(c => c.id === t.category_id);
        return cat ? cat.name : '';
      }

      if (loading) return <div className="app"><div className="loading">Loading CondoKeep...</div></div>;

      return (
        <div className="app">
          <div className="header">
            <h1>🏢 Condo<span>Keep</span></h1>
            <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>
              {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </span>
          </div>

          {view === 'tasks' && (
            <div className="stats">
              <div className="stat-card">
                <div className="stat-number" style={{ color: 'var(--danger)' }}>{counts.overdue}</div>
                <div className="stat-label">Overdue</div>
              </div>
              <div className="stat-card">
                <div className="stat-number" style={{ color: 'var(--warning)' }}>{counts.due}</div>
                <div className="stat-label">Due Soon</div>
              </div>
              <div className="stat-card">
                <div className="stat-number" style={{ color: 'var(--accent-hover)' }}>{counts.upcoming}</div>
                <div className="stat-label">Upcoming</div>
              </div>
              <div className="stat-card">
                <div className="stat-number" style={{ color: 'var(--success)' }}>{counts.completed}</div>
                <div className="stat-label">Completed</div>
              </div>
            </div>
          )}

          <div className="view-tabs">
            <button className={`view-tab ${view === 'tasks' ? 'active' : ''}`}
              onClick={() => setView('tasks')}>My Tasks</button>
            <button className={`view-tab ${view === 'guide' ? 'active' : ''}`}
              onClick={() => setView('guide')}>How-To Guide</button>
          </div>

          <div className="filters">
            {view === 'tasks' && [
              ['active', 'Active'],
              ['overdue', 'Overdue'],
              ['completed', 'Completed'],
            ].map(([key, label]) => (
              <button key={key} className={`filter-btn ${filter === key ? 'active' : ''}`}
                onClick={() => setFilter(key)}>{label}</button>
            ))}
            {view === 'tasks' && (
              <span style={{ width: 1, background: 'var(--border)', margin: '0 4px' }}></span>
            )}
            {['all', ...categories.map(c => c.name)].map(name => (
              <button key={name} className={`filter-btn ${categoryFilter === name ? 'active' : ''}`}
                onClick={() => setCategoryFilter(name)}>
                {name === 'all' ? 'All Categories' : `${categoryIcons[name] || ''} ${name}`}
              </button>
            ))}
          </div>

          {/* TASKS VIEW */}
          {view === 'tasks' && (
            <div className="task-list">
              {filtered.length === 0 ? (
                <div className="empty-state">
                  <div className="emoji">{filter === 'overdue' ? '🎉' : '📋'}</div>
                  <p>{filter === 'overdue' ? 'Nothing overdue! Nice work.' : 'No tasks to show.'}</p>
                </div>
              ) : filtered.map(task => {
                const status = getStatus(task);
                const catName = task.template?.category?.name || '';
                const color = categoryColors[catName] || '#6366f1';
                return (
                  <div key={task.id} className={`task-card ${status === 'completed' ? 'completed' : ''}`}
                    onClick={() => { setSelectedTask(task); setNotes(''); setConfirmDeleteId(null); }}>
                    <div className="task-icon" style={{ background: color + '18', color }}>
                      {categoryIcons[catName] || '📋'}
                    </div>
                    <div className="task-content">
                      <div className="task-name">{task.template?.name || 'Task'}</div>
                      <div className="task-meta">
                        <span>{getDueText(task)}</span>
                        <span>&middot;</span>
                        <span>{formatDate(task.due_date)}</span>
                        {task.template?.estimated_minutes && (
                          <><span>&middot;</span><span>{task.template.estimated_minutes} min</span></>
                        )}
                        {task.template?.difficulty && (
                          <><span>&middot;</span><Difficulty level={task.template.difficulty} /></>
                        )}
                      </div>
                    </div>
                    <span className={`task-badge badge-${status}`}>{status}</span>
                    {status !== 'completed' && (
                      <div className="task-actions" onClick={e => e.stopPropagation()}>
                        <button className="action-btn complete" title="Mark complete"
                          onClick={() => { setSelectedTask(task); setNotes(''); setConfirmDeleteId(null); }}>&#10003;</button>
                        <button className="action-btn snooze" title="Snooze 7 days"
                          onClick={() => snoozeTask(task, 7)}>&#9200;</button>
                        <button className="action-btn delete" title="Remove this chore"
                          onClick={() => { setSelectedTask(task); setConfirmDeleteId(task.template_id); setNotes(''); }}>&#10005;</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* HOW-TO GUIDE VIEW */}
          {view === 'guide' && (
            <div className="task-list">
              {filteredTemplates.length === 0 ? (
                <div className="empty-state">
                  <div className="emoji">📖</div>
                  <p>No guides to show for this category.</p>
                </div>
              ) : filteredTemplates.map(tmpl => {
                const catName = getCatForTemplate(tmpl);
                return (
                  <GuideCard
                    key={tmpl.id}
                    template={tmpl}
                    catIcon={categoryIcons[catName] || '📋'}
                    catColor={categoryColors[catName] || '#6366f1'}
                    onRemove={removeTemplate}
                  />
                );
              })}
            </div>
          )}

          {/* TASK DETAIL MODAL */}
          {selectedTask && (
            <div className="modal-overlay" onClick={() => { setSelectedTask(null); setConfirmDeleteId(null); }}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <h2>{selectedTask.template?.name}</h2>
                  <span className="task-badge" style={{ marginTop: 4, background: categoryColors[selectedTask.template?.category?.name] + '18', color: categoryColors[selectedTask.template?.category?.name] }}>
                    {selectedTask.template?.category?.name}
                  </span>
                </div>
                <p>{selectedTask.template?.description}</p>

                {selectedTask.template?.tips && (
                  <div className="tip-box">
                    <strong>Step-by-step instructions:</strong><br /><br />
                    {selectedTask.template.tips}
                  </div>
                )}

                <div style={{ display: 'flex', gap: 16, marginBottom: 20, fontSize: 13, color: 'var(--text-muted)', flexWrap: 'wrap' }}>
                  <span>📅 {formatDate(selectedTask.due_date)}</span>
                  {selectedTask.template?.estimated_minutes && <span>⏱ {selectedTask.template.estimated_minutes} min</span>}
                  {selectedTask.template?.difficulty && <span>Difficulty: {selectedTask.template.difficulty}</span>}
                  {selectedTask.template?.frequency_days && <span>🔄 {freqLabel(selectedTask.template.frequency_days)}</span>}
                </div>

                {/* Confirm delete bar */}
                {confirmDeleteId === selectedTask.template_id && (
                  <div className="confirm-bar">
                    <span>Remove this chore permanently? It won't come back.</span>
                    <div className="confirm-bar-actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => setConfirmDeleteId(null)}>Cancel</button>
                      <button className="btn btn-danger btn-sm" onClick={() => removeTemplate(selectedTask.template_id)}>Remove</button>
                    </div>
                  </div>
                )}

                {getStatus(selectedTask) !== 'completed' && !confirmDeleteId && (
                  <>
                    <textarea placeholder="Add notes (optional)..." value={notes}
                      onChange={e => setNotes(e.target.value)} />
                    <div className="modal-actions">
                      <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)', borderColor: 'rgba(239,68,68,0.3)', marginRight: 'auto' }}
                        onClick={() => setConfirmDeleteId(selectedTask.template_id)}>
                        Remove chore
                      </button>
                      <button className="btn btn-ghost" onClick={() => setSelectedTask(null)}>Cancel</button>
                      <button className="btn btn-warning" onClick={() => snoozeTask(selectedTask, 7)}>Snooze 7d</button>
                      <button className="btn btn-success" onClick={() => completeTask(selectedTask)}>&#10003; Complete</button>
                    </div>
                  </>
                )}
                {getStatus(selectedTask) === 'completed' && (
                  <div className="modal-actions">
                    {selectedTask.notes && (
                      <div style={{ flex: 1, fontSize: 13, color: 'var(--text-muted)', fontStyle: 'italic' }}>
                        Note: {selectedTask.notes}
                      </div>
                    )}
                    <button className="btn btn-ghost" onClick={() => setSelectedTask(null)}>Close</button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
